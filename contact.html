<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0f172a;
  color:white;
}

header {
  text-align:center;
  padding:20px;
  background:#020617;
}

.container {
  max-width:600px;
  margin:30px auto;
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

.btn {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:12px 0;
  padding:14px;
  border-radius:8px;
  text-decoration:none;
  color:white;
  background:#334155;
  transition:0.3s;
  font-size:16px;
}

.btn img {
  width:20px;
  filter:invert(1);
}

.btn:hover {
  background:#38bdf8;
  color:black;
  transform:scale(1.05);
}

.back {
  margin-top:20px;
  display:block;
  color:#38bdf8;
}
</style>
</head>

<body>

<header>
  <h2>Contact</h2>
</header>

<div class="container">
  <p>Connect with me:</p>

  <a class="btn" href="https://facebook.com/asif.j30" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg">
    Facebook
  </a>

  <a class="btn" href="https://instagram.com/resetasif" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg">
    Instagram
  </a>

  <a class="btn" href="https://x.com/asifonwork" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg">
    X (Twitter)
  </a>

  <a class="back" href="/">← Back to Home</a>
</div>

</body>
</html>
