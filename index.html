<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>বাংলাদেশ লাইভ নিউজ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans Bengali', Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 25px 15px;
      background: #020617;
    }

    header h1 {
      font-size: 48px;
      margin: 0;
    }

    .creator {
      margin-top: 10px;
      font-size: 16px;
      opacity: 0.8;
    }

    .social {
      margin-top: 12px;
    }

    .social a {
      margin: 0 10px;
      display: inline-block;
    }

    .social img {
      width: 22px;
      filter: invert(1);
      transition: 0.3s;
    }

    .social img:hover {
      transform: scale(1.2);
    }

    .nav-links {
      text-align: center;
      margin-top: 10px;
    }

    .nav-links a {
      color: #38bdf8;
      margin: 0 10px;
      text-decoration: none;
      font-size: 14px;
    }

    .update-time {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.7;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 15px;
      background: #1e293b;
      border-radius: 20px;
      cursor: pointer;
    }

    .tab:hover {
      background: #334155;
    }

    .breaking {
      max-width: 900px;
      margin: auto;
      padding: 10px;
    }

    .breaking h2 {
      color: #f43f5e;
    }

    .breaking-item {
      background: #7f1d1d;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
    }

    .news-container {
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      margin-bottom: 15px;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    img.news-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .content {
      padding: 15px;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    .time {
      font-size: 12px;
      opacity: 0.7;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      background: #020617;
      margin-top: 20px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<header>
  <h1>বাংলাদেশ লাইভ নিউজ</h1>
  <div class="creator">Created by Md. Asif Jahan</div>

  <div class="social">
    <a href="https://facebook.com/asif.j30" target="_blank">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg">
    </a>

    <a href="https://instagram.com/resetasif" target="_blank">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg">
    </a>

    <a href="https://x.com/asifonwork" target="_blank">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg">
    </a>
  </div>

  <!-- NEW NAV LINKS -->
  <div class="nav-links">
    <a href="/about.html">About</a> |
    <a href="/contact.html">Contact</a> |
    <a href="/privacy.html">Privacy</a>
  </div>
</header>

<div class="update-time" id="updateTime"></div>

<div class="tabs">
  <div class="tab" onclick="loadNews('top')">সর্বশেষ</div>
  <div class="tab" onclick="loadNews('sports')">খেলা</div>
  <div class="tab" onclick="loadNews('national')">জাতীয়</div>
</div>

<div class="breaking" id="breaking"></div>

<div class="news-container" id="news">লোড হচ্ছে...</div>

<footer>
  © 2026 Md. Asif Jahan - All Rights Reserved
</footer>

<script>
const feeds = {
  top: "https://api.rss2json.com/v1/api.json?rss_url=https://www.prothomalo.com/feed/",
  sports: "https://api.rss2json.com/v1/api.json?rss_url=https://www.prothomalo.com/sports/feed/",
  national: "https://api.rss2json.com/v1/api.json?rss_url=https://www.prothomalo.com/bangladesh/feed/"
};

async function loadNews(type) {
  const container = document.getElementById("news");
  const breakingBox = document.getElementById("breaking");

  container.innerHTML = "লোড হচ্ছে...";
  breakingBox.innerHTML = "";

  const res = await fetch(feeds[type]);
  const data = await res.json();

  const now = new Date();
  document.getElementById("updateTime").innerText =
    "সর্বশেষ আপডেট: " + now.toLocaleString('bn-BD');

  container.innerHTML = "";

  // Breaking news
  breakingBox.innerHTML = "<h2>🔴 ব্রেকিং নিউজ</h2>";

  data.items.slice(0, 3).forEach(n => {
    const div = document.createElement("div");
    div.className = "breaking-item";
    div.innerHTML = `<a href="${n.link}" target="_blank">${n.title}</a>`;
    breakingBox.appendChild(div);
  });

  // All news
  data.items.slice(0, 10).forEach(n => {

    let img = n.thumbnail || 
              (n.enclosure && n.enclosure.link) || 
              "https://via.placeholder.com/800x400?text=No+Image";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img class="news-img" src="${img}">
      <div class="content">
        <h3>${n.title}</h3>
        <div class="time">${new Date(n.pubDate).toLocaleString('bn-BD')}</div>
        <br>
        <a href="${n.link}" target="_blank">সম্পূর্ণ পড়ুন</a>
      </div>
    `;

    container.appendChild(div);
  });
}

// Auto refresh every 10 minutes
setInterval(() => {
  loadNews('top');
}, 600000);

loadNews('top');
</script>

</body>
</html>
