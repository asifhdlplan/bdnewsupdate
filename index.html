<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>বাংলাদেশ নিউজ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans Bengali', Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 26px;
      font-weight: bold;
      background: #020617;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 15px;
      background: #1e293b;
      border-radius: 20px;
      cursor: pointer;
    }

    .tab:hover {
      background: #334155;
    }

    .news-container {
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      margin-bottom: 15px;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .content {
      padding: 15px;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    .time {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>🇧🇩 বাংলাদেশ লাইভ নিউজ</header>

<div class="tabs">
  <div class="tab" onclick="loadNews('top')">সর্বশেষ</div>
  <div class="tab" onclick="loadNews('sports')">খেলা</div>
  <div class="tab" onclick="loadNews('national')">জাতীয়</div>
</div>

<div class="news-container" id="news">লোড হচ্ছে...</div>

<script>
const feeds = {
  top: "https://api.rss2json.com/v1/api.json?rss_url=https://www.prothomalo.com/feed/",
  sports: "https://api.rss2json.com/v1/api.json?rss_url=https://www.prothomalo.com/sports/feed/",
  national: "https://api.rss2json.com/v1/api.json?rss_url=https://www.prothomalo.com/bangladesh/feed/"
};

async function loadNews(type) {
  const container = document.getElementById("news");
  container.innerHTML = "লোড হচ্ছে...";

  const res = await fetch(feeds[type]);
  const data = await res.json();

  container.innerHTML = "";

  data.items.slice(0, 10).forEach(n => {

    // Try to extract image
    let img = "";
    if (n.thumbnail) {
      img = n.thumbnail;
    } else if (n.enclosure && n.enclosure.link) {
      img = n.enclosure.link;
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${img ? `<img src="${img}">` : ""}
      <div class="content">
        <h3>${n.title}</h3>
        <div class="time">${new Date(n.pubDate).toLocaleString('bn-BD')}</div>
        <br>
        <a href="${n.link}" target="_blank">সম্পূর্ণ পড়ুন</a>
      </div>
    `;

    container.appendChild(div);
  });
}

loadNews('top');
</script>

</body>
</html>
