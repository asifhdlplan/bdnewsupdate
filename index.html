<!DOCTYPE html>
<html>
<head>
  <title>BD News Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      background: #020617;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 15px;
      background: #1e293b;
      border-radius: 20px;
      cursor: pointer;
    }

    .tab:hover {
      background: #334155;
    }

    .news-container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    .time {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>🇧🇩 BD Premium News</header>

<div class="tabs">
  <div class="tab" onclick="loadNews('top')">Top</div>
  <div class="tab" onclick="loadNews('sports')">Sports</div>
  <div class="tab" onclick="loadNews('business')">Business</div>
  <div class="tab" onclick="loadNews('technology')">Tech</div>
</div>

<div class="news-container" id="news">Loading...</div>

<script>
const feeds = {
  top: "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/asia/rss.xml",
  sports: "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/sport/rss.xml",
  business: "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/business/rss.xml",
  technology: "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/technology/rss.xml"
};

async function loadNews(type) {
  const container = document.getElementById("news");
  container.innerHTML = "Loading...";

  const res = await fetch(feeds[type]);
  const data = await res.json();

  container.innerHTML = "";

  data.items.slice(0, 10).forEach(n => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${n.title}</h3>
      <p>${n.description.substring(0, 120)}...</p>
      <div class="time">${new Date(n.pubDate).toLocaleString()}</div>
      <br>
      <a href="${n.link}" target="_blank">Read full news</a>
    `;

    container.appendChild(div);
  });
}

loadNews('top');
</script>

</body>
</html>
